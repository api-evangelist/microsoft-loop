aid: microsoft-loop
name: Microsoft Loop
description: >-
  Microsoft Loop is a collaborative productivity app that brings together
  teams, content, and tasks across Microsoft 365 tools. It provides API
  access through Microsoft Graph for managing Loop workspaces and
  components.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
